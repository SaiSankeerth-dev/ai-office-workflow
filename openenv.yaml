version: "1"

environment:
  name: ai-office-workflow-simulator
  description: Reinforcement learning environment for email triage, meeting extraction, and multi-intent recognition
  version: "1.0.0"

runtime:
  type: docker
  language: python
  version: "3.10"

entrypoint:
  module: environment
  class: OfficeWorkflowEnv
  file: inference.py

variables:
  API_BASE_URL:
    description: Base URL for API calls
    default: "https://sankeerth275-ai-office-workflow.hf.space"
    required: false
  MODEL_NAME:
    description: Model name for inference
    default: "gpt-4o-mini"
    required: false
  OPENAI_API_KEY:
    description: OpenAI API key
    required: false
  HF_TOKEN:
    description: Hugging Face token
    required: false

tasks:
  - id: classification
    name: Email Classification
    description: Classify emails as spam, urgent, or normal
    difficulty:
      - easy
      - medium
      - hard

  - id: schedule_extraction
    name: Meeting Extraction
    description: Extract meeting information from emails
    difficulty:
      - easy
      - medium
      - hard

  - id: multi_intent
    name: Multi-Intent Recognition
    description: Identify all intents in emails and generate replies
    difficulty:
      - easy
      - medium
      - hard

metadata:
  author: AI Office Workflow Team
  license: MIT
  tags:
    - email
    - classification
    - nlp
    - reinforcement-learning
    - workflow
  github: https://github.com/SaiSankeerth-dev/ai-office-workflow